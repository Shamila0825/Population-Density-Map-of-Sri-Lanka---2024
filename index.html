<!DOCTYPE html>
<html>

<head>
    <title>Sri Lanka Population map - 2024</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            right: 0;
            left: 0;
        }

        .info {
            padding: 6px 8px;
            font: 14px Arial, Helvetica, sans-serif;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            border-radius: 5px;
        }

        .legend {
            line-height: 18px;
            color: #555;
        }

        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>

        // Create map element
        var map = L.map("map").setView([8.0, 81.0], 8);
        // Load OSM tile layer
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        var geojson;

        var info = L.control();


        function getColor(pop_den) {
            pop_den = Number(pop_den);
            return pop_den > 1800 ? '#800026' :
                pop_den > 1300 ? '#BD0026' :
                    pop_den > 900 ? '#E31A1C' :
                        pop_den > 500 ? '#FC4E2A' :
                            pop_den > 200 ? '#FD8D3C' :
                                '#FEB24C';
        }

        function style(feature) {
            return {
                fillColor: getColor(feature.properties.pop_density),
                weight: 1,
                color: 'white',
                opacity: 1,
                fillOpacity: 0.7
            };
        }

        function highlightFeature(event) {
            var layer = event.target;

            layer.setStyle({
                weight: 1,
                color: '#666',
                fillOpacity: 0.7
            });

            layer.bringToFront();
            info.update(layer.feature.properties);
        }

        function resetHighlight(e) {
            geojson.resetStyle(e.target);
            info.update();
        }

        function zoomToFeature(e) {
            map.fitBounds(e.target.getBounds());
        }


        function onEachFeature(feature, layer) {

            layer.bindTooltip(`
        <h2>${feature.properties.NAME_1}</h2>
        <h3>Population Density: ${feature.properties.pop_density}  people / km<sup>2</sup></h3>
    `, {
                direction: 'top',
                sticky: true
            });
            layer.on({
                mouseover: highlightFeature,
                mouseout: resetHighlight,
                click: zoomToFeature
            });
        }

        info.onAdd = function () {
            this._div = L.DomUtil.create('div', 'info');
            this.update();
            return this._div;
        };

        info.update = function (props) {
            this._div.innerHTML =
                '<h2> Population Density by Districts in Sri Lanka - 2024 </h2>' +
                '<h3> Hover over a district </h3>'
        };

        info.addTo(map);




        // LOAD GEOJSON
        fetch("districts_new_1.geojson")
            .then(response => response.json())
            .then(data => {
                geojson = L.geoJson(data, {
                    style: style,
                    onEachFeature: onEachFeature
                }).addTo(map);
            });


        // LEGEND
        // Add legend
        var legend = L.control({ position: 'bottomright' });
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend'),
                grades = [20, 200, 500, 900, 1300, 1800];

            for (var i = 0; i < grades.length; i++) {
                div.innerHTML +=
                    '<div><i style="background:' + getColor(grades[i] + 1) + '"></i> ' +
                    grades[i] +
                    (grades[i + 1] ? '&ndash;' + grades[i + 1] : '+') +
                    '</div>';
            }

            return div;
        };
        legend.addTo(map);

    </script>

</body>

</html>
